name: "Multi-Severity Interval Boundary Times"
description: "Single resolved multi-severity incident for verifying that tooltip end times at severity interval boundaries are 5-minute rounded. The incident escalates from info to warning to critical over 5 hours."
incidents:
  - id: "monitoring-multi-severity-boundary-001"
    component: "monitoring"
    layer: "core"
    timeline:
      start: "6h"
      end: "1h"
      severityChanges:
        - time: "6h"
          severity: "info"
        - time: "4h"
          severity: "warning"
        - time: "2h"
          severity: "critical"
    alerts:
      - name: "MonitoringLatencyHigh001"
        namespace: "openshift-monitoring"
        severity: "info"
        firing: false
        timeline:
          start: "6h"
          end: "4h"
      - name: "MonitoringDegraded001"
        namespace: "openshift-monitoring"
        severity: "warning"
        firing: false
        timeline:
          start: "4h"
          end: "2h"
      - name: "MonitoringDown001"
        namespace: "openshift-monitoring"
        severity: "critical"
        firing: false
        timeline:
          start: "2h"
          end: "1h"

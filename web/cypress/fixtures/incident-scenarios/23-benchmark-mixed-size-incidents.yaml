name: "23 - Performance Benchmark - Mixed Size Incidents"
description: >
  12 incidents with heterogeneous alert counts (1 large, 2 medium, 3 small-medium,
  6 small) for benchmarking chart rendering with realistic data distribution.
  Uses 1h timeline consistent with other stress test fixtures.

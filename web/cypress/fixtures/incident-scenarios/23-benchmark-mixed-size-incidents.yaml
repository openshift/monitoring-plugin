      - { name: LargeMonCrit07, namespace: openshift-monitoring, severity: critical, firing: true }
      - { name: LargeMonCrit08, namespace: openshift-monitoring, severity: critical, firing: true }
      - { name: LargeMonCrit09, namespace: openshift-monitoring, severity: critical, firing: true }
      - { name: LargeMonCrit10, namespace: openshift-monitoring, severity: critical, firing: true }
      - { name: LargeMonWarn01, namespace: openshift-monitoring, severity: warning, firing: true }

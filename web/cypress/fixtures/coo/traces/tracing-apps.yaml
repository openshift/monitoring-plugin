apiVersion: project.openshift.io/v1
kind: Project
metadata:
  name: tracing-app-k6
---
apiVersion: project.openshift.io/v1
kind: Project
metadata:
  name: tracing-app-hotrod
---
apiVersion: project.openshift.io/v1
kind: Project
metadata:
  name: tracing-app-telemetrygen
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: hotrod
  name: hotrod
  namespace: tracing-app-hotrod
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hotrod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hotrod
    spec:
      containers:
      - image: jaegertracing/example-hotrod:1.46
        name: hotrod
        args:
        - all
        - --otel-exporter=otlp
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://user-collector.openshift-tracing:4318
        ports:
        - containerPort: 8080
          name: frontend
        - containerPort: 8081
          name: customer
        - containerPort: 8083
          name: route
        resources:
          limits:
            cpu: 100m
            memory: 100M
          requests:
            cpu: 100m
            memory: 100M
---
apiVersion: v1
kind: Service
metadata:
  name: hotrod
  namespace: tracing-app-hotrod
spec:
  selector:
    app.kubernetes.io/name: hotrod
  ports:
  - name: frontend
    port: 8080
    targetPort: frontend
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: hotrod
  namespace: tracing-app-hotrod
spec:
  to:
    kind: Service
    name: hotrod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: k6-tracing
  name: k6-tracing
  namespace: tracing-app-k6
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k6-tracing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k6-tracing
    spec:
      containers:
      - name: k6-tracing
        image: ghcr.io/grafana/xk6-client-tracing:v0.0.5
        env:
        - name: ENDPOINT
          value: user-collector.openshift-tracing:4317
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: telemetrygen
  name: telemetrygen
  namespace: tracing-app-telemetrygen
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: telemetrygen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telemetrygen
    spec:
      # in total 5 spans per second are generated, with 2/5 (40%) containing an error
      containers:
      # this generates 3 spans per second
      - name: telemetrygen1
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.105.0
        args:
          - traces
          - --otlp-endpoint=user-collector.openshift-tracing:4317
          - --otlp-insecure
          - --duration=1h
          - --service=good_service
          - --rate=3 # spans per second
          - --child-spans=2
      # this generates 2 spans per second with an error status
      - name: telemetrygen2
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.105.0
        args:
          - traces
          - --otlp-endpoint=user-collector.openshift-tracing:4317
          - --otlp-insecure
          - --duration=1h
          - --service=faulty_service
          - --rate=2 # spans per second
          - --child-spans=1
          - --status-code=Error

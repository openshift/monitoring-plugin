openapi: "3.0.3"
info:
  title: Monitoring Plugin Management API
  description: >
    API for managing alert rules in OpenShift Monitoring Plugin.
    All endpoints require a valid OpenShift user bearer token in the
    Authorization header (forwarded by the console bridge).
  version: "1.0.0"

servers:
  - url: /api/v1/alerting

paths:
  /rules:
    patch:
      operationId: BulkUpdateAlertRules
      summary: Bulk update alert rules
      description: >
        Updates one or more alert rules by their stable IDs. Each rule is
        updated independently; per-rule status is returned in the response
        so partial success is visible to the caller.
        Supports label overrides, drop/restore toggles (platform rules only),
        and classification label updates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateAlertRulesRequest"
      responses:
        "200":
          description: Update results (may include per-rule errors)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUpdateAlertRulesResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid authorization token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Request body exceeds the 1 MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: BulkDeleteUserDefinedAlertRules
      summary: Bulk delete user-defined alert rules
      description: >
        Deletes one or more user-defined alert rules by their stable IDs.
        Each rule is deleted independently; per-rule status is returned in
        the response so partial success is visible to the caller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteAlertRulesRequest"
      responses:
        "200":
          description: Deletion results (may include per-rule errors)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteAlertRulesResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid authorization token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: CreateAlertRule
      summary: Create an alert rule
      description: >
        Creates a new alert rule. If prometheusRule is omitted the rule is
        created as a platform alert rule; if prometheusRule is provided the
        rule is created as a user-defined alert rule in the specified
        PrometheusRule resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertRuleRequest"
      responses:
        "201":
          description: Alert rule created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAlertRuleResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid authorization token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Operation not allowed (e.g. rule is externally managed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict (e.g. duplicate rule ID)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    AlertRuleSpec:
      type: object
      description: >
        Specification of a Prometheus alerting or recording rule.
        Maps to prometheus-operator Rule fields.
      properties:
        alert:
          type: string
          description: Name of the alert. Must be set for alerting rules.
        record:
          type: string
          description: Name of the time series for recording rules.
        expr:
          type: string
          description: PromQL expression to evaluate.
        for:
          type: string
          description: Duration the condition must be true before firing (e.g. "5m").
        labels:
          type: object
          additionalProperties:
            type: string
          description: Labels to attach to alerts produced by the rule.
        annotations:
          type: object
          additionalProperties:
            type: string
          description: Annotations to attach to alerts produced by the rule.
        keepFiringFor:
          type: string
          description: >
            Duration to keep alert firing after the condition is no longer true.

    PrometheusRuleTarget:
      type: object
      description: >
        Identifies the PrometheusRule resource and rule group where the alert
        rule will be stored. Required for user-defined alert rules.
      required:
        - prometheusRuleName
        - prometheusRuleNamespace
      properties:
        prometheusRuleName:
          type: string
          description: Name of the PrometheusRule resource.
        prometheusRuleNamespace:
          type: string
          description: Namespace of the PrometheusRule resource.
        groupName:
          type: string
          description: Name of the rule group within the PrometheusRule. Optional.

    CreateAlertRuleRequest:
      type: object
      properties:
        alertingRule:
          $ref: "#/components/schemas/AlertRuleSpec"
        prometheusRule:
          $ref: "#/components/schemas/PrometheusRuleTarget"

    CreateAlertRuleResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Computed stable ID for the created alert rule.

    BulkDeleteAlertRulesRequest:
      type: object
      required:
        - ruleIds
      properties:
        ruleIds:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
          description: List of stable alert rule IDs to delete (at most 100 per request).

    DeleteAlertRuleResult:
      type: object
      required:
        - id
        - statusCode
      properties:
        id:
          type: string
          description: The stable alert rule ID that was processed.
        statusCode:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP status code for this rule's deletion result.
        message:
          type: string
          description: Error message if deletion failed; omitted on success.

    BulkDeleteAlertRulesResponse:
      type: object
      required:
        - rules
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/DeleteAlertRuleResult"
          description: Per-rule deletion results.

    AlertRuleClassificationUpdate:
      type: object
      description: >
        Partial update for alert rule classification labels.
        Each field supports three states: omitted (leave unchanged),
        null (clear the override), or a string value (set the override).
        The three-state semantics require a custom JSON decoder; the Go
        type AlertRuleClassificationPatch is used at runtime instead of
        the generated struct.
      x-go-type: AlertRuleClassificationPatch
      properties:
        openshift_io_alert_rule_component:
          type: string
          nullable: true
          description: Component classification label override.
        openshift_io_alert_rule_layer:
          type: string
          nullable: true
          description: Layer classification label override.
        openshift_io_alert_rule_component_from:
          type: string
          nullable: true
          description: Dynamic component source label key.
        openshift_io_alert_rule_layer_from:
          type: string
          nullable: true
          description: Dynamic layer source label key.

    BulkUpdateAlertRulesRequest:
      type: object
      required:
        - ruleIds
      properties:
        ruleIds:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
          description: List of stable alert rule IDs to update (at most 100 per request).
        labels:
          type: object
          additionalProperties:
            type: string
            nullable: true
          description: >
            Label key/value pairs to set. A null or empty-string value removes
            the label. Omitting this field leaves existing labels unchanged.
        alertingRuleEnabled:
          type: boolean
          nullable: true
          description: >
            When false, drops the alert rule via an AlertRelabelConfig Drop
            action — the rule no longer appears in Prometheus query results.
            When true, restores a previously dropped rule.
            Only supported for platform alert rules.
        classification:
          $ref: "#/components/schemas/AlertRuleClassificationUpdate"

    UpdateAlertRuleResult:
      type: object
      required:
        - id
        - statusCode
      properties:
        id:
          type: string
          description: The stable alert rule ID that was processed.
        statusCode:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP status code for this rule's update result.
        message:
          type: string
          description: Error message if update failed; omitted on success.

    BulkUpdateAlertRulesResponse:
      type: object
      required:
        - rules
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/UpdateAlertRuleResult"
          description: Per-rule update results.

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message.
